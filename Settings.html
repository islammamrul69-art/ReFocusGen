<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
  </head>
  <body class="settings-page">

    <nav class="navbar">
      <a href="Index.html" class="navbar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12L12 3l9 9M4 10v10a1 1 0 001 1h5v-6h4v6h5a1 1 0 001-1V10" />
        </svg>
        <span>Home</span>
      </a>
      <a href="Add.html" class="navbar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        <span>Add</span>
      </a>
      <a href="Settings.html" class="navbar-link active">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <div class="settings-content">
      <h2 class="settings-title">Settings</h2>
      <p class="settings-sub">Manage your preferences</p>

      <div class="settings-card">
        <div class="settings-card-header">
          <span class="settings-card-icon">🎨</span>
          <span class="settings-card-label">App Theme</span>
        </div>
        <p class="settings-card-desc">Choose between light and dark appearance</p>
        <div class="theme-toggle-row">
          <button id="themeLight" class="theme-btn theme-btn-light active" onclick="setTheme('light')">
            ☀️ White
          </button>
          <button id="themeDark" class="theme-btn theme-btn-dark" onclick="setTheme('dark')">
            🌙 Black
          </button>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-header">
          <span class="settings-card-icon">🗑</span>
          <span class="settings-card-label">Clear Data</span>
        </div>
        <p class="settings-card-desc">This will permanently delete all your tasks.</p>
        <button class="clear-btn" onclick="clearAllTasks()">
          🗑 Clear All Tasks
        </button>
      </div>
    </div>

    <script src="Script.js" defer></script>
    <script>
      function clearAllTasks() {
        if (confirm("Are you sure you want to delete all tasks? This cannot be undone.")) {
          localStorage.removeItem("tasks");
          showToast("All tasks cleared!", "success");
        }
      }

      function updateThemeButtons() {
        const theme = localStorage.getItem("theme") || "light";
        document.getElementById("themeLight").classList.toggle("active", theme === "light");
        document.getElementById("themeDark").classList.toggle("active", theme === "dark");
      }

      document.addEventListener("DOMContentLoaded", updateThemeButtons);
    </script>
  </body>
</html>
